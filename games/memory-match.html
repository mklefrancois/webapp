<!DOCTYPE html>
<html lang="en">
<head>
<!-- Memory Match keeps an array of cards. Tapping cards changes their state. -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Memory">
<meta name="theme-color" content="#111114">
<link rel="apple-touch-icon" sizes="180x180" href="../images/hub-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="32x32" href="../images/hub-favicon.png?v=1">
<title>Memory Match</title>
<style>
  :root { --dark:#111114; --panel:#1C1C21; --border:rgba(255,255,255,.1); --text:#F0EEE8; --muted:rgba(240,238,232,.58); --red:#E8173A; --yellow:#F5C400; --blue:#0057B8; --green:#00964B; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { min-height:100dvh; background:radial-gradient(circle at 15% 0%, rgba(232,23,58,.2), transparent 22rem), var(--dark); color:var(--text); font-family:ui-rounded,"Avenir Next","Segoe UI",system-ui,sans-serif; }
  main { width:min(720px,100%); margin:0 auto; padding:16px 14px 36px; }
  header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
  h1 { font-size:clamp(2rem,7vw,4rem); line-height:.95; }
  a, button { color:var(--text); text-decoration:none; border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,.06); padding:10px 12px; font:inherit; cursor:pointer; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
  .stat, .grid { border:1px solid var(--border); border-radius:12px; background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018)),var(--panel); box-shadow:0 16px 34px rgba(0,0,0,.22); }
  .stat { min-height:62px; padding:10px; }
  .stat span { display:block; color:var(--muted); font-size:.72rem; font-weight:850; letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
  .stat strong { font-size:1.45rem; font-variant-numeric:tabular-nums; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:10px; }
  .card { aspect-ratio:1; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:#24242B; color:#fff; display:grid; place-items:center; font-size:clamp(1.6rem,9vw,3rem); font-weight:950; cursor:pointer; box-shadow:0 8px 16px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.08); }
  .card.open, .card.done { background:linear-gradient(135deg,var(--blue),var(--green)); }
  .card.done { opacity:.58; }
  .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .primary { background:linear-gradient(135deg,var(--red),#8e1022); border:0; font-weight:950; text-transform:uppercase; }
  .message { text-align:center; color:var(--muted); min-height:24px; margin-top:10px; }
</style>
</head>
<body>
<main>
  <header><h1>Memory Match</h1><a href="../index.html">App Shelf</a></header>
  <section class="stats"><div class="stat"><span>Moves</span><strong id="moves">0</strong></div><div class="stat"><span>Pairs</span><strong id="pairs">0</strong></div><div class="stat"><span>Best</span><strong id="best">--</strong></div></section>
  <section class="grid" id="grid"></section>
  <div class="controls"><button class="primary" onclick="newGame()">New Game</button><button onclick="peek()">Peek</button></div>
  <div class="message" id="message">Find all matching pairs.</div>
</main>
<script>
const SYMBOLS = ['A','B','C','D','E','F','G','H'];
const BEST_KEY = 'memory_best_moves';
let cards = [];
let open = [];
let moves = 0;
let matched = 0;
let busy = false;

function shuffle(items) {
  const a = items.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function newGame() {
  cards = shuffle([...SYMBOLS, ...SYMBOLS]).map((value, id) => ({ id, value, open:false, done:false }));
  open = [];
  moves = 0;
  matched = 0;
  busy = false;
  setMessage('Find all matching pairs.');
  render();
}
function tapCard(id) {
  if (busy) return;
  const card = cards.find(c => c.id === id);
  if (!card || card.open || card.done) return;
  card.open = true;
  open.push(card);
  if (open.length === 2) checkPair();
  render();
}
function checkPair() {
  moves++;
  const [a, b] = open;
  if (a.value === b.value) {
    a.done = b.done = true;
    matched++;
    open = [];
    if (matched === SYMBOLS.length) finish();
  } else {
    busy = true;
    setTimeout(() => {
      a.open = b.open = false;
      open = [];
      busy = false;
      render();
    }, 650);
  }
}
function finish() {
  const best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
  if (!best || moves < best) localStorage.setItem(BEST_KEY, String(moves));
  setMessage('Cleared in ' + moves + ' moves.');
}
function peek() {
  cards.forEach(card => { if (!card.done) card.open = true; });
  render();
  setTimeout(() => { cards.forEach(card => { if (!card.done) card.open = false; }); render(); }, 900);
}
function render() {
  document.getElementById('grid').innerHTML = cards.map(card => `<button class="card ${card.open ? 'open' : ''} ${card.done ? 'done' : ''}" onclick="tapCard(${card.id})">${card.open || card.done ? card.value : ''}</button>`).join('');
  document.getElementById('moves').textContent = moves;
  document.getElementById('pairs').textContent = matched + '/' + SYMBOLS.length;
  document.getElementById('best').textContent = localStorage.getItem(BEST_KEY) || '--';
}
function setMessage(text) { document.getElementById('message').textContent = text; }
newGame();
</script>
</body>
</html>
