<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Snake is a small canvas game.

  New browser idea in this file:
  - <canvas> is a drawable bitmap area. JavaScript draws rectangles/circles
    into it, similar to rendering a simple 2D game frame in C++.

  Layout goal:
  - Portrait/narrow aspect ratio: board on top, D-pad and A/B controls below.
  - Landscape/wide aspect ratio: A/B controls on the left, board in the middle,
    D-pad on the right.

  The layout switch is CSS-only using an aspect-ratio media query.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Snake">
<meta name="theme-color" content="#111114">
<link rel="apple-touch-icon" sizes="180x180" href="../images/hub-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="32x32" href="../images/hub-favicon.png?v=1">
<title>Snake</title>
<style>
  /*
    Same visual vocabulary as the other apps: dark panel, UNO-ish accent colors,
    and large touch targets.
  */
  :root {
    --red: #E8173A;
    --yellow: #F5C400;
    --blue: #0057B8;
    --green: #00964B;
    --dark: #111114;
    --panel: #1C1C21;
    --border: rgba(255,255,255,.1);
    --text: #F0EEE8;
    --muted: rgba(240,238,232,.58);
    --button: #24242B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100dvh;
    background:
      radial-gradient(circle at 12% 4%, rgba(0,150,75,.2), transparent 22rem),
      radial-gradient(circle at 92% 8%, rgba(245,196,0,.14), transparent 21rem),
      var(--dark);
    color: var(--text);
    font-family: ui-rounded, "Avenir Next", "Segoe UI", system-ui, sans-serif;
    overflow-x: hidden;
  }

  button { font: inherit; }

  main {
    width: min(980px, 100%);
    min-height: 100dvh;
    margin: 0 auto;
    padding: 16px 14px 30px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: clamp(2rem, 7vw, 4rem);
    line-height: .95;
    letter-spacing: 0;
  }

  .back {
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 12px;
    background: rgba(255,255,255,.045);
  }

  /*
    Portrait/default layout.
    The grid areas put the stage first, then D-pad left and A/B right at the bottom.
  */
  .game-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-areas:
      "stage stage"
      "dpad actions";
    gap: 14px;
    align-items: center;
  }

  .stage { grid-area: stage; }
  .dpad-panel { grid-area: dpad; }
  .action-panel { grid-area: actions; }

  .panel {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), var(--panel);
    box-shadow: 0 16px 34px rgba(0,0,0,.22);
  }

  .stage {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
  }

  .status {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat {
    min-height: 62px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,.04);
    padding: 10px;
  }

  .stat span {
    display: block;
    color: var(--muted);
    font-size: .7rem;
    font-weight: 850;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat strong {
    font-size: 1.45rem;
    line-height: 1;
    font-weight: 950;
    font-variant-numeric: tabular-nums;
  }

  /*
    The canvas has a fixed internal resolution in JavaScript, but CSS scales it
    to fit the screen. aspect-ratio keeps it square.
  */
  .board-frame {
    width: min(92vw, 620px);
    aspect-ratio: 1;
    margin: 0 auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #0B0B0E;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  .message {
    min-height: 24px;
    text-align: center;
    color: var(--muted);
    font-size: .92rem;
  }

  .control-panel {
    min-height: 174px;
    display: grid;
    place-items: center;
    padding: 12px;
  }

  /*
    D-pad is a 3x3 CSS grid. Empty cells preserve the cross shape.
    The buttons call setDirection() in JavaScript.
  */
  .dpad {
    width: min(42vw, 174px);
    aspect-ratio: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
  }

  .dpad button, .action-button {
    border: 1px solid rgba(255,255,255,.13);
    background: var(--button);
    color: var(--text);
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 9px 18px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.07);
  }

  .dpad button {
    border-radius: 10px;
    font-size: 1.35rem;
    font-weight: 950;
  }

  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .center {
    grid-column: 2;
    grid-row: 2;
    border-radius: 9px;
    background: rgba(255,255,255,.06);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 3; }

  .action-pad {
    width: min(42vw, 186px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: center;
  }

  .action-button {
    aspect-ratio: 1;
    border-radius: 999px;
    display: grid;
    place-items: center;
    align-content: center;
    gap: 2px;
  }

  .action-button strong {
    display: block;
    font-size: 2rem;
    line-height: .9;
    font-weight: 950;
  }

  .action-button span {
    display: block;
    color: var(--muted);
    font-size: .66rem;
    font-weight: 850;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .action-button.a {
    background: linear-gradient(160deg, var(--red), #b80d28);
  }

  .action-button.b {
    background: linear-gradient(160deg, var(--blue), #003b83);
  }

  .dpad button:active, .action-button:active {
    transform: translateY(2px) scale(.98);
  }

  /*
    Landscape/wide layout.
    Aspect ratio is the important condition: when the screen is wide enough,
    move A/B to the left and the D-pad to the right.
  */
  @media (min-aspect-ratio: 4 / 3) and (min-width: 760px) {
    body { overflow: hidden; }

    main {
      display: flex;
      flex-direction: column;
      padding-bottom: 16px;
    }

    .game-layout {
      flex: 1;
      grid-template-columns: minmax(154px, 188px) minmax(340px, min(68vh, 62vw)) minmax(154px, 188px);
      grid-template-areas: "actions stage dpad";
      justify-content: center;
      align-items: center;
    }

    .stage {
      max-height: calc(100dvh - 110px);
      justify-content: center;
    }

    .board-frame {
      width: min(68vh, 62vw, 620px);
    }

    .control-panel {
      min-height: min(44vh, 250px);
      align-self: center;
    }

    .dpad, .action-pad {
      width: min(16vw, 182px);
      min-width: 148px;
    }
  }

  @media (max-width: 640px) {
    header { align-items: flex-start; flex-direction: column; }
    .status { grid-template-columns: repeat(3, 1fr); }
    .control-panel { min-height: 150px; }
    .dpad, .action-pad { width: min(44vw, 164px); }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>Snake</h1>
    <a class="back" href="../index.html">App Shelf</a>
  </header>

  <section class="game-layout" aria-label="Snake game">
    <!-- A/B action buttons. In landscape CSS moves this panel to the left. -->
    <section class="panel control-panel action-panel" aria-label="Action buttons">
      <div class="action-pad">
        <button class="action-button b" onclick="resetGame()" aria-label="Reset game">
          <strong>B</strong>
          <span>Reset</span>
        </button>
        <button class="action-button a" onclick="startPause()" aria-label="Start or pause game">
          <strong>A</strong>
          <span id="a-label">Start</span>
        </button>
      </div>
    </section>

    <!-- The stage is the actual game board plus score labels. -->
    <section class="panel stage">
      <div class="status" aria-label="Game status">
        <div class="stat"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat"><span>Best</span><strong id="best">0</strong></div>
        <div class="stat"><span>State</span><strong id="state-label">Ready</strong></div>
      </div>

      <div class="board-frame">
        <canvas id="board" width="400" height="400" aria-label="Snake board"></canvas>
      </div>

      <div class="message" id="message">Press A to start.</div>
    </section>

    <!-- Direction pad. In landscape CSS moves this panel to the right. -->
    <section class="panel control-panel dpad-panel" aria-label="Direction pad">
      <div class="dpad">
        <button class="up" onclick="setDirection('up')" aria-label="Move up">^</button>
        <button class="left" onclick="setDirection('left')" aria-label="Move left">&lt;</button>
        <div class="center" aria-hidden="true"></div>
        <button class="right" onclick="setDirection('right')" aria-label="Move right">&gt;</button>
        <button class="down" onclick="setDirection('down')" aria-label="Move down">v</button>
      </div>
    </section>
  </section>
</main>

<script>
/*
  Snake program model.

  Instead of moving DOM elements around, this game draws every frame on a canvas.
  The game state is plain JavaScript data:
  - snake: array of grid cells, head first
  - direction / nextDirection: current and requested movement
  - food: one grid cell
  - running / paused / gameOver: state machine flags
*/

// Constants: board resolution and saved-score key.
const CELL_COUNT = 20;
const CANVAS_SIZE = 400;
const CELL_SIZE = CANVAS_SIZE / CELL_COUNT;
const STEP_MS = 135;
const BEST_KEY = 'snake_best';

// Direction vectors. These are like small integer structs in C++.
const DIRECTIONS = {
  up: { x: 0, y: -1 },
  down: { x: 0, y: 1 },
  left: { x: -1, y: 0 },
  right: { x: 1, y: 0 }
};

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

let snake = [];
let direction = DIRECTIONS.right;
let nextDirection = DIRECTIONS.right;
let food = { x: 12, y: 10 };
let score = 0;
let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0;
let running = false;
let paused = false;
let gameOver = false;
let loopId = null;
let touchStart = null;

function sameCell(a, b) {
  return a.x === b.x && a.y === b.y;
}

function randomCell() {
  return {
    x: Math.floor(Math.random() * CELL_COUNT),
    y: Math.floor(Math.random() * CELL_COUNT)
  };
}

// Keep trying random cells until food is not inside the snake body.
function spawnFood() {
  let candidate = randomCell();
  while (snake.some(cell => sameCell(cell, candidate))) {
    candidate = randomCell();
  }
  food = candidate;
}

function resetGame() {
  clearTimeout(loopId);
  snake = [
    { x: 8, y: 10 },
    { x: 7, y: 10 },
    { x: 6, y: 10 }
  ];
  direction = DIRECTIONS.right;
  nextDirection = DIRECTIONS.right;
  score = 0;
  running = false;
  paused = false;
  gameOver = false;
  spawnFood();
  updateLabels();
  setMessage('Press A to start.');
  draw();
}

/*
  A button behavior:
  - Ready: start moving.
  - Running: pause.
  - Paused: resume.
  - Game over: reset and start.
*/
function startPause() {
  if (gameOver) {
    resetGame();
    startPause();
    return;
  }

  if (!running) {
    running = true;
    paused = false;
    setMessage('');
    scheduleStep();
  } else {
    paused = !paused;
    if (paused) {
      clearTimeout(loopId);
      setMessage('Paused.');
    } else {
      setMessage('');
      scheduleStep();
    }
  }

  updateLabels();
}

/*
  Direction changes are delayed until the next game step.
  This prevents double-tap reversals from making the snake collide with itself.
*/
function setDirection(name) {
  const requested = DIRECTIONS[name];
  if (!requested || gameOver) return;

  const reversing = requested.x + direction.x === 0 && requested.y + direction.y === 0;
  if (reversing) return;
  nextDirection = requested;
}

function scheduleStep() {
  clearTimeout(loopId);
  if (running && !paused && !gameOver) {
    loopId = setTimeout(step, STEP_MS);
  }
}

function step() {
  direction = nextDirection;
  const head = snake[0];
  const nextHead = {
    x: head.x + direction.x,
    y: head.y + direction.y
  };

  if (hitWall(nextHead) || hitSelf(nextHead)) {
    endGame();
    return;
  }

  snake.unshift(nextHead);

  if (sameCell(nextHead, food)) {
    score += 10;
    if (score > best) {
      best = score;
      localStorage.setItem(BEST_KEY, String(best));
    }
    spawnFood();
  } else {
    snake.pop();
  }

  updateLabels();
  draw();
  scheduleStep();
}

function hitWall(cell) {
  return cell.x < 0 || cell.x >= CELL_COUNT || cell.y < 0 || cell.y >= CELL_COUNT;
}

function hitSelf(cell) {
  return snake.some(segment => sameCell(segment, cell));
}

function endGame() {
  clearTimeout(loopId);
  running = false;
  paused = false;
  gameOver = true;
  updateLabels();
  setMessage('Game over. Press A to try again.');
  draw();
}

function updateLabels() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('state-label').textContent = gameOver ? 'Over' : paused ? 'Pause' : running ? 'Play' : 'Ready';
  document.getElementById('a-label').textContent = gameOver ? 'Retry' : running && !paused ? 'Pause' : 'Start';
}

function setMessage(text) {
  document.getElementById('message').textContent = text;
}

function draw() {
  ctx.fillStyle = '#0B0B0E';
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  drawGrid();
  drawFood();
  drawSnake();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,.045)';
  ctx.lineWidth = 1;
  for (let i = 1; i < CELL_COUNT; i++) {
    const p = i * CELL_SIZE;
    ctx.beginPath();
    ctx.moveTo(p, 0);
    ctx.lineTo(p, CANVAS_SIZE);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, p);
    ctx.lineTo(CANVAS_SIZE, p);
    ctx.stroke();
  }
}

function drawFood() {
  const cx = food.x * CELL_SIZE + CELL_SIZE / 2;
  const cy = food.y * CELL_SIZE + CELL_SIZE / 2;
  ctx.fillStyle = '#F5C400';
  ctx.beginPath();
  ctx.arc(cx, cy, CELL_SIZE * .34, 0, Math.PI * 2);
  ctx.fill();
}

function drawSnake() {
  snake.forEach((cell, index) => {
    const inset = index === 0 ? 2 : 3;
    ctx.fillStyle = index === 0 ? '#18C96B' : '#00964B';
    ctx.fillRect(
      cell.x * CELL_SIZE + inset,
      cell.y * CELL_SIZE + inset,
      CELL_SIZE - inset * 2,
      CELL_SIZE - inset * 2
    );
  });
}

// Desktop keyboard support. The touch controls use the same setDirection function.
document.addEventListener('keydown', event => {
  if (event.key === 'ArrowUp') setDirection('up');
  if (event.key === 'ArrowDown') setDirection('down');
  if (event.key === 'ArrowLeft') setDirection('left');
  if (event.key === 'ArrowRight') setDirection('right');
  if (event.key === ' ' || event.key === 'Enter') startPause();
  if (event.key.toLowerCase() === 'r') resetGame();
});

// Simple swipe support on the board itself.
canvas.addEventListener('touchstart', event => {
  const touch = event.touches[0];
  touchStart = { x: touch.clientX, y: touch.clientY };
  event.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', event => {
  event.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', event => {
  if (!touchStart || !event.changedTouches.length) return;
  const touch = event.changedTouches[0];
  const dx = touch.clientX - touchStart.x;
  const dy = touch.clientY - touchStart.y;
  touchStart = null;

  if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDirection(dx > 0 ? 'right' : 'left');
  } else {
    setDirection(dy > 0 ? 'down' : 'up');
  }
  event.preventDefault();
}, { passive: false });

resetGame();
</script>
</body>
</html>
