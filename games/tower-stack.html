<!DOCTYPE html>
<html lang="en">
<head>
<!-- Tower Stack is a timing game drawn on canvas. Tap when the moving block aligns. -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stack">
<meta name="theme-color" content="#111114">
<link rel="apple-touch-icon" sizes="180x180" href="../images/hub-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="32x32" href="../images/hub-favicon.png?v=1">
<title>Tower Stack</title>
<style>
  :root { --dark:#111114; --panel:#1C1C21; --border:rgba(255,255,255,.1); --text:#F0EEE8; --muted:rgba(240,238,232,.58); --red:#E8173A; --yellow:#F5C400; --blue:#0057B8; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { min-height:100dvh; background:radial-gradient(circle at 20% 0%, rgba(0,87,184,.18), transparent 24rem), var(--dark); color:var(--text); font-family:ui-rounded,"Avenir Next","Segoe UI",system-ui,sans-serif; }
  main { width:min(720px,100%); margin:0 auto; padding:16px 14px 36px; }
  header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
  h1 { font-size:clamp(2rem,7vw,4rem); line-height:.95; }
  a, button { color:var(--text); text-decoration:none; border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,.06); padding:10px 12px; font:inherit; cursor:pointer; }
  .stage { border:1px solid var(--border); border-radius:12px; background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018)),var(--panel); padding:12px; box-shadow:0 16px 34px rgba(0,0,0,.22); }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
  .stat { border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,.04); padding:10px; }
  .stat span { display:block; color:var(--muted); font-size:.72rem; font-weight:850; letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
  .stat strong { font-size:1.45rem; font-variant-numeric:tabular-nums; }
  canvas { display:block; width:100%; max-width:420px; aspect-ratio:7/10; margin:0 auto; border-radius:10px; background:#0B0B0E; touch-action:manipulation; }
  .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .primary { background:linear-gradient(135deg,var(--red),#8e1022); border:0; font-weight:950; text-transform:uppercase; }
  .message { text-align:center; color:var(--muted); min-height:24px; margin-top:10px; }
</style>
</head>
<body>
<main>
  <header><h1>Tower Stack</h1><a href="../index.html">App Shelf</a></header>
  <section class="stage">
    <div class="stats"><div class="stat"><span>Height</span><strong id="height">0</strong></div><div class="stat"><span>Best</span><strong id="best">0</strong></div><div class="stat"><span>Width</span><strong id="width">0</strong></div></div>
    <canvas id="canvas" width="420" height="600" onclick="dropBlock()"></canvas>
    <div class="message" id="message">Tap Drop to start.</div>
  </section>
  <div class="controls"><button class="primary" onclick="dropBlock()">Drop</button><button onclick="resetGame()">Reset</button></div>
</main>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const BEST_KEY = 'tower_best';
const W = 420, H = 600, BLOCK_H = 28;
let stack = [];
let moving = null;
let dir = 1;
let speed = 2.2;
let running = false;
let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0;
let raf = null;

function resetGame() {
  cancelAnimationFrame(raf);
  stack = [{ x: 90, y: H - BLOCK_H, w: 240, color: '#0057B8' }];
  speed = 2.2;
  dir = 1;
  running = true;
  spawnMoving();
  setMessage('Tap when the block lines up.');
  loop();
}
function spawnMoving() {
  const top = stack[stack.length - 1];
  moving = { x: 0, y: top.y - BLOCK_H, w: top.w, color: colorFor(stack.length) };
}
function colorFor(i) {
  return ['#E8173A','#F5C400','#0057B8','#00964B'][i % 4];
}
function dropBlock() {
  if (!running) { resetGame(); return; }
  const top = stack[stack.length - 1];
  const left = Math.max(moving.x, top.x);
  const right = Math.min(moving.x + moving.w, top.x + top.w);
  const overlap = right - left;
  if (overlap <= 4) { endGame(); return; }
  moving.x = left;
  moving.w = overlap;
  stack.push({ ...moving });
  speed += .16;
  if (stack.length - 1 > best) { best = stack.length - 1; localStorage.setItem(BEST_KEY, String(best)); }
  spawnMoving();
  updateStats();
}
function endGame() {
  running = false;
  cancelAnimationFrame(raf);
  setMessage('Tower fell. Tap Drop to retry.');
  draw();
}
function loop() {
  if (!running) return;
  moving.x += speed * dir;
  if (moving.x <= 0 || moving.x + moving.w >= W) dir *= -1;
  draw();
  raf = requestAnimationFrame(loop);
}
function draw() {
  ctx.fillStyle = '#0B0B0E';
  ctx.fillRect(0,0,W,H);
  const camera = Math.max(0, (stack.length + 1) * BLOCK_H - H + 80);
  [...stack, moving].filter(Boolean).forEach(block => {
    ctx.fillStyle = block.color;
    ctx.fillRect(block.x, block.y + camera, block.w, BLOCK_H - 2);
    ctx.fillStyle = 'rgba(255,255,255,.16)';
    ctx.fillRect(block.x, block.y + camera, block.w, 4);
  });
  updateStats();
}
function updateStats() {
  document.getElementById('height').textContent = Math.max(0, stack.length - 1);
  document.getElementById('best').textContent = best;
  document.getElementById('width').textContent = moving ? Math.round(moving.w) : 0;
}
function setMessage(text) { document.getElementById('message').textContent = text; }
resetGame();
</script>
</body>
</html>
