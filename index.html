<!DOCTYPE html>
<html lang="en">
<head>
<!--
  index.html is the "app shelf" page.

  A single HTML file can contain:
  1. <head> metadata: browser/iPad settings, icons, page title.
  2. <style> CSS: visual rules, similar to a style/theme layer in a UI toolkit.
  3. <body> HTML: the actual visible structure.

  This page deliberately has no JavaScript because it only links to apps/games.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Apps">
<meta name="theme-color" content="#111114">
<link rel="apple-touch-icon" sizes="180x180" href="images/hub-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="32x32" href="images/hub-favicon.png?v=1">
<link rel="manifest" href="manifest.webmanifest?v=3">
<title>iPad Apps</title>
<style>
  /*
    CSS custom properties are variables.
    In C++ terms, think of these as named constants for the theme.
    Example: var(--red) below expands to #E8173A.
  */
  :root {
    --red: #E8173A;
    --yellow: #F5C400;
    --blue: #0057B8;
    --green: #00964B;
    --dark: #111114;
    --panel: #1C1C21;
    --border: rgba(255,255,255,0.1);
    --text: #F0EEE8;
    --muted: rgba(240,238,232,0.58);
  }

  /*
    A small reset. Browsers add default margins/padding; clearing them makes
    layout predictable. box-sizing:border-box means width includes padding,
    which is usually easier to reason about.
  */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* Page-level styling: background, text color, and the default font. */
  body {
    min-height: 100dvh;
    background:
      radial-gradient(circle at top left, rgba(232,23,58,.18), transparent 25rem),
      radial-gradient(circle at top right, rgba(0,87,184,.14), transparent 24rem),
      var(--dark);
    color: var(--text);
    font-family: ui-rounded, "Avenir Next", "Segoe UI", system-ui, sans-serif;
  }

  /*
    main is the centered content container.
    width:min(980px, 100%) means "use 980px on large screens, but never
    exceed the screen width." This is why it works on both desktop and iPad.
  */
  main {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 22px 16px 44px;
  }

  /* Top row of the shelf: title on the left, GitHub Pages badge on the right. */
  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  /*
    clamp(min, preferred, max) lets the title scale without becoming tiny
    or absurdly large. This is a good responsive CSS pattern.
  */
  h1 {
    font-size: clamp(2rem, 7vw, 4.6rem);
    line-height: .9;
    letter-spacing: 0;
  }

  /* A small non-clickable status label. */
  .badge {
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    padding: 9px 13px;
    font-size: .82rem;
    white-space: nowrap;
    background: rgba(255,255,255,.045);
  }

  /*
    CSS Grid lays out the app cards.
    auto-fit + minmax means "create as many columns as fit, but each card
    needs at least 230px." On narrow iPads/phones this naturally becomes one column.
  */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 14px;
  }

  /*
    Each app-card is an <a> link styled like a card.
    The entire card is tappable, which is nicer on touch screens than a tiny button.
  */
  .app-card {
    min-height: 210px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), var(--panel);
    color: inherit;
    padding: 18px;
    text-decoration: none;
    box-shadow: 0 16px 34px rgba(0,0,0,.22);
  }

  .app-card:active { transform: scale(.985); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  /* Shared icon size for real PNG icons and CSS-made placeholder icons. */
  .app-icon {
    width: 74px;
    height: 74px;
    border-radius: 16px;
    box-shadow: 0 10px 20px rgba(0,0,0,.28);
  }

  /* The Color Chase icon is drawn with CSS squares instead of a separate image. */
  .color-icon {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
    padding: 9px;
    background: #121217;
  }

  .color-icon span {
    border-radius: 9px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.16);
  }

  /* The Snake icon is also CSS-only: a green loop plus a yellow food dot. */
  .snake-icon {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(rgba(255,255,255,.04), rgba(255,255,255,0)),
      #121217;
  }

  .snake-icon::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 16px;
    width: 44px;
    height: 44px;
    border: 9px solid var(--green);
    border-left-color: transparent;
    border-bottom-color: transparent;
    border-radius: 15px;
    transform: rotate(45deg);
  }

  .snake-icon::after {
    content: "";
    position: absolute;
    right: 14px;
    bottom: 14px;
    width: 13px;
    height: 13px;
    border-radius: 999px;
    background: var(--yellow);
    box-shadow: 0 0 18px rgba(245,196,0,.65);
  }

  .arrow {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 1.2rem;
  }

  h2 {
    font-size: 1.45rem;
    margin-bottom: 7px;
    letter-spacing: 0;
  }

  p {
    color: var(--muted);
    line-height: 1.35;
    font-size: .95rem;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    border-radius: 999px;
    background: rgba(255,255,255,.065);
    color: var(--muted);
    padding: 5px 9px;
    font-size: .76rem;
  }

  /*
    Media queries are conditional CSS.
    This block only runs when the viewport is 620px wide or less.
  */
  @media (max-width: 620px) {
    header { align-items: flex-start; flex-direction: column; }
    .app-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<main>
  <!-- Visible page header. -->
  <header>
    <h1>iPad Apps</h1>
    <div class="badge">GitHub Pages</div>
  </header>

  <!--
    App cards. To add another app later, copy one <a class="app-card"> block,
    change the href, title, description, and icon.
  -->
  <section class="app-grid" aria-label="Available apps">
    <a class="app-card" href="uno-tracker.html">
      <div class="card-top">
        <img class="app-icon" src="images/apple-touch-icon.png" alt="">
        <div class="arrow">></div>
      </div>
      <div>
        <h2>UNO Tracker</h2>
        <p>Winner scoring, session history, and live stats.</p>
      </div>
      <div class="card-meta">
        <span class="pill">Tracker</span>
        <span class="pill">2-4 players</span>
      </div>
    </a>

    <a class="app-card" href="games/color-chase.html">
      <div class="card-top">
        <div class="app-icon color-icon" aria-hidden="true">
          <span style="background:var(--red)"></span>
          <span style="background:var(--yellow)"></span>
          <span style="background:var(--blue)"></span>
          <span style="background:var(--green)"></span>
        </div>
        <div class="arrow">></div>
      </div>
      <div>
        <h2>Color Chase</h2>
        <p>Tap the matching card before the clock runs out.</p>
      </div>
      <div class="card-meta">
        <span class="pill">Game</span>
        <span class="pill">Touch</span>
      </div>
    </a>

    <a class="app-card" href="games/snake.html">
      <div class="card-top">
        <div class="app-icon snake-icon" aria-hidden="true"></div>
        <div class="arrow">></div>
      </div>
      <div>
        <h2>Snake</h2>
        <p>Classic grid snake with handheld-style touch controls.</p>
      </div>
      <div class="card-meta">
        <span class="pill">Game</span>
        <span class="pill">D-pad</span>
      </div>
    </a>
  </section>
</main>
</body>
</html>
