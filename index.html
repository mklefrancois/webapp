<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Apps">
<meta name="theme-color" content="#111114">
<link rel="apple-touch-icon" sizes="180x180" href="images/hub-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="32x32" href="images/hub-favicon.png?v=1">
<link rel="manifest" href="manifest.webmanifest?v=3">
<title>iPad Apps</title>
<style>
  :root {
    --red: #E8173A;
    --yellow: #F5C400;
    --blue: #0057B8;
    --green: #00964B;
    --dark: #111114;
    --panel: #1C1C21;
    --border: rgba(255,255,255,0.1);
    --text: #F0EEE8;
    --muted: rgba(240,238,232,0.58);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100dvh;
    background:
      radial-gradient(circle at top left, rgba(232,23,58,.18), transparent 25rem),
      radial-gradient(circle at top right, rgba(0,87,184,.14), transparent 24rem),
      var(--dark);
    color: var(--text);
    font-family: ui-rounded, "Avenir Next", "Segoe UI", system-ui, sans-serif;
  }

  main {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 22px 16px 44px;
  }

  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  h1 {
    font-size: clamp(2rem, 7vw, 4.6rem);
    line-height: .9;
    letter-spacing: 0;
  }

  .badge {
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    padding: 9px 13px;
    font-size: .82rem;
    white-space: nowrap;
    background: rgba(255,255,255,.045);
  }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 14px;
  }

  .app-card {
    min-height: 210px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), var(--panel);
    color: inherit;
    padding: 18px;
    text-decoration: none;
    box-shadow: 0 16px 34px rgba(0,0,0,.22);
  }

  .app-card:active { transform: scale(.985); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .app-icon {
    width: 74px;
    height: 74px;
    border-radius: 16px;
    box-shadow: 0 10px 20px rgba(0,0,0,.28);
  }

  .color-icon {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
    padding: 9px;
    background: #121217;
  }

  .color-icon span {
    border-radius: 9px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.16);
  }

  .arrow {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 1.2rem;
  }

  h2 {
    font-size: 1.45rem;
    margin-bottom: 7px;
    letter-spacing: 0;
  }

  p {
    color: var(--muted);
    line-height: 1.35;
    font-size: .95rem;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    border-radius: 999px;
    background: rgba(255,255,255,.065);
    color: var(--muted);
    padding: 5px 9px;
    font-size: .76rem;
  }

  @media (max-width: 620px) {
    header { align-items: flex-start; flex-direction: column; }
    .app-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>iPad Apps</h1>
    <div class="badge">GitHub Pages</div>
  </header>

  <section class="app-grid" aria-label="Available apps">
    <a class="app-card" href="uno-tracker.html">
      <div class="card-top">
        <img class="app-icon" src="images/apple-touch-icon.png" alt="">
        <div class="arrow">></div>
      </div>
      <div>
        <h2>UNO Tracker</h2>
        <p>Winner scoring, session history, and live stats.</p>
      </div>
      <div class="card-meta">
        <span class="pill">Tracker</span>
        <span class="pill">2-4 players</span>
      </div>
    </a>

    <a class="app-card" href="games/color-chase.html">
      <div class="card-top">
        <div class="app-icon color-icon" aria-hidden="true">
          <span style="background:var(--red)"></span>
          <span style="background:var(--yellow)"></span>
          <span style="background:var(--blue)"></span>
          <span style="background:var(--green)"></span>
        </div>
        <div class="arrow">></div>
      </div>
      <div>
        <h2>Color Chase</h2>
        <p>Tap the matching card before the clock runs out.</p>
      </div>
      <div class="card-meta">
        <span class="pill">Game</span>
        <span class="pill">Touch</span>
      </div>
    </a>
  </section>
</main>
</body>
</html>
