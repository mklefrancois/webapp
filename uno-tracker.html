<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UNO Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #E8173A;
    --yellow: #F5C400;
    --blue:   #0057B8;
    --green:  #00964B;
    --dark:   #111114;
    --card:   #1C1C21;
    --border: rgba(255,255,255,0.08);
    --text:   #F0EEE8;
    --muted:  rgba(240,238,232,0.45);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: var(--dark);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--red), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--text); -webkit-text-fill-color: var(--text); opacity: .35; font-size: 1rem; font-family: 'DM Sans', sans-serif; margin-left: 6px; }
  .tab-bar { display: flex; gap: 6px; }
  .tab {
    padding: 7px 16px; border-radius: 30px; font-size: .85rem; font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .2s;
  }
  .tab.active { background: var(--red); color: #fff; border-color: var(--red); }

  /* ── MAIN LAYOUT ── */
  main { padding: 20px 16px 40px; max-width: 900px; margin: 0 auto; }

  /* ── SETUP SCREEN ── */
  #screen-setup { animation: fadeIn .3s ease; }
  .setup-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 28px 24px; margin-bottom: 16px;
  }
  .setup-card h2 { font-family: 'Boogaloo', cursive; font-size: 1.4rem; margin-bottom: 18px; color: var(--yellow); }

  .player-count-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .count-btn {
    flex: 1; padding: 14px; border-radius: 12px; font-size: 1.3rem; font-family: 'Boogaloo', cursive;
    border: 2px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .2s;
  }
  .count-btn.active { border-color: var(--red); color: var(--red); background: rgba(232,23,58,.1); }

  .player-inputs { display: flex; flex-direction: column; gap: 12px; }
  .player-input-row { display: flex; align-items: center; gap: 12px; }
  .player-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  }
  .player-input-row input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none;
    transition: border-color .2s;
  }
  .player-input-row input:focus { border-color: rgba(255,255,255,0.25); }

  .start-btn {
    width: 100%; padding: 18px; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--red), #c0102d);
    color: #fff; font-family: 'Boogaloo', cursive; font-size: 1.5rem;
    border: none; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 24px rgba(232,23,58,.4);
    transition: transform .15s, box-shadow .15s;
    margin-top: 8px;
  }
  .start-btn:active { transform: scale(.97); box-shadow: 0 2px 12px rgba(232,23,58,.3); }

  /* ── GAME SCREEN ── */
  #screen-game { display: none; animation: fadeIn .3s ease; }

  .scoreboard {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    margin-bottom: 20px;
  }
  .score-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 18px 16px;
    position: relative; overflow: hidden; transition: transform .2s;
  }
  .score-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .score-card:nth-child(1)::before { background: var(--red); }
  .score-card:nth-child(2)::before { background: var(--blue); }
  .score-card:nth-child(3)::before { background: var(--green); }
  .score-card:nth-child(4)::before { background: var(--yellow); }

  .score-card .player-name { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .score-card .total-score { font-family: 'Boogaloo', cursive; font-size: 2.6rem; line-height: 1; }
  .score-card .wins-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.06); border-radius: 20px;
    padding: 3px 10px; font-size: .75rem; color: var(--muted); margin-top: 6px;
  }

  /* ── ADD ROUND ── */
  .round-panel {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 20px; margin-bottom: 16px;
  }
  .round-panel h3 { font-family: 'Boogaloo', cursive; font-size: 1.2rem; color: var(--yellow); margin-bottom: 14px; }
  .round-inputs { display: flex; flex-direction: column; gap: 10px; }
  .round-row { display: flex; align-items: center; gap: 12px; }
  .round-row label { font-size: .9rem; flex: 1; display: flex; align-items: center; gap: 8px; }
  .round-row label span { color: var(--muted); font-size: .8rem; }
  .score-input {
    width: 100px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem; text-align: right;
    outline: none; transition: border-color .2s;
  }
  .score-input:focus { border-color: rgba(255,255,255,0.25); }

  .add-round-btn {
    width: 100%; padding: 15px; border-radius: 12px; margin-top: 14px;
    background: linear-gradient(135deg, var(--green), #007a3d);
    color: #fff; font-family: 'Boogaloo', cursive; font-size: 1.3rem;
    border: none; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(0,150,75,.35);
    transition: transform .15s;
  }
  .add-round-btn:active { transform: scale(.97); }

  /* ── STATS ── */
  .stats-grid {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 20px; margin-bottom: 16px;
  }
  .stats-grid h3 { font-family: 'Boogaloo', cursive; font-size: 1.2rem; color: var(--blue); margin-bottom: 14px; }
  .stats-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .stats-table th {
    text-align: left; color: var(--muted); font-weight: 500; font-size: .75rem;
    text-transform: uppercase; letter-spacing: .06em; padding: 0 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .stats-table th:not(:first-child) { text-align: right; }
  .stats-table td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .stats-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
  .stats-table tr:last-child td { border-bottom: none; }
  .player-tag { display: inline-flex; align-items: center; gap: 7px; font-weight: 500; }
  .player-tag-dot { width: 8px; height: 8px; border-radius: 50%; }
  .leader-chip {
    background: rgba(245,196,0,.15); color: var(--yellow);
    border-radius: 20px; padding: 2px 8px; font-size: .7rem; font-weight: 600;
  }

  /* ── WIN GOAL ── */
  .goal-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px 20px; margin-bottom: 16px;
    gap: 12px;
  }
  .goal-label { font-size: .85rem; color: var(--muted); }
  .goal-value { font-family: 'Boogaloo', cursive; font-size: 1.3rem; }
  .goal-input-wrap { display: flex; align-items: center; gap: 8px; }
  .goal-input {
    width: 80px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: .9rem; text-align: center;
    outline: none;
  }

  /* ── HISTORY ── */
  #screen-history { display: none; animation: fadeIn .3s ease; }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-session {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px 20px;
  }
  .history-session-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; cursor: pointer;
  }
  .session-date { font-size: .8rem; color: var(--muted); }
  .session-summary { font-family: 'Boogaloo', cursive; font-size: 1rem; }
  .history-rounds { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .history-rounds.open { display: block; }
  .round-line {
    display: flex; justify-content: space-between; font-size: .82rem;
    padding: 4px 0; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .round-line:last-child { border: none; }
  .round-line strong { color: var(--text); }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .big { font-family: 'Boogaloo', cursive; font-size: 3rem; margin-bottom: 12px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e1e24; border: 1px solid var(--border); border-radius: 30px;
    padding: 12px 24px; font-size: .9rem; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,.5); opacity: 0;
    transition: all .3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── WIN MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 24px; border: 1px solid var(--border);
    padding: 36px 32px; text-align: center; max-width: 320px; width: 90%;
    transform: scale(.92); transition: transform .3s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .modal-title { font-family: 'Boogaloo', cursive; font-size: 2rem; color: var(--yellow); }
  .modal-sub { color: var(--muted); margin: 8px 0 24px; font-size: .9rem; }
  .modal-btn {
    padding: 13px 28px; border-radius: 12px; font-family: 'Boogaloo', cursive;
    font-size: 1.2rem; border: none; cursor: pointer; width: 100%; margin-top: 8px;
  }
  .modal-btn.primary { background: var(--red); color: #fff; }
  .modal-btn.secondary { background: rgba(255,255,255,.07); color: var(--muted); }

  /* ── BAR CHART ── */
  .bar-wrap { margin-top: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: .8rem; }
  .bar-name { width: 70px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
  .bar-track { flex: 1; height: 8px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.22,1,.36,1); }
  .bar-val { width: 36px; text-align: right; color: var(--muted); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .new-game-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: .9rem;
    cursor: pointer; transition: all .2s; margin-top: 4px;
  }
  .new-game-btn:hover { background: rgba(255,255,255,.09); color: var(--text); }

  .player-colors { --p0: var(--red); --p1: var(--blue); --p2: var(--green); --p3: var(--yellow); }
</style>
</head>
<body class="player-colors">

<!-- HEADER -->
<header>
  <div class="logo">UNO <span>tracker</span></div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('setup')" id="tab-setup">Setup</button>
    <button class="tab" onclick="showTab('game')" id="tab-game">Game</button>
    <button class="tab" onclick="showTab('history')" id="tab-history">History</button>
  </div>
</header>

<!-- SETUP SCREEN -->
<main>
<div id="screen-setup">
  <div class="setup-card">
    <h2>🃏 Number of Players</h2>
    <div class="player-count-row">
      <button class="count-btn active" onclick="setCount(2)" id="cnt2">2</button>
      <button class="count-btn" onclick="setCount(3)" id="cnt3">3</button>
      <button class="count-btn" onclick="setCount(4)" id="cnt4">4</button>
    </div>
    <h2>Player Names</h2>
    <div class="player-inputs" id="player-inputs"></div>
  </div>

  <div class="setup-card">
    <h2>🏆 Win Goal (points)</h2>
    <div style="display:flex;align-items:center;gap:12px;">
      <input type="number" id="win-goal-setup" class="score-input" value="500" min="1" style="width:100px;text-align:center;">
      <span style="color:var(--muted);font-size:.9rem;">First to reach this total wins the game session</span>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">START GAME →</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game">
  <div class="scoreboard" id="scoreboard"></div>

  <div class="round-panel">
    <h3>➕ Add Round</h3>
    <div class="round-inputs" id="round-inputs"></div>
    <button class="add-round-btn" onclick="addRound()">SAVE ROUND</button>
  </div>

  <div class="stats-grid">
    <h3>📊 Statistics</h3>
    <table class="stats-table" id="stats-table">
      <thead>
        <tr>
          <th>Player</th>
          <th>Rounds</th>
          <th>Wins</th>
          <th>Win %</th>
          <th>Avg Score</th>
          <th>To Goal</th>
        </tr>
      </thead>
      <tbody id="stats-body"></tbody>
    </table>

    <div style="margin-top:20px;">
      <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px;">Score Race</div>
      <div class="bar-wrap" id="bar-chart"></div>
    </div>
  </div>

  <div class="goal-row">
    <div>
      <div class="goal-label">Win Goal</div>
      <div class="goal-value" id="goal-display">500 pts</div>
    </div>
    <div class="goal-input-wrap">
      <input type="number" id="win-goal-game" class="goal-input" value="500" min="1" oninput="updateGoal(this.value)">
      <span style="color:var(--muted);font-size:.8rem;">pts</span>
    </div>
  </div>

  <button class="new-game-btn" onclick="confirmNewGame()">↺ New Game Session</button>
</div>

<!-- HISTORY SCREEN -->
<div id="screen-history">
  <div class="history-list" id="history-list"></div>
</div>

</main>

<!-- WIN MODAL -->
<div class="modal-overlay" id="win-modal">
  <div class="modal">
    <div class="modal-emoji">🎉</div>
    <div class="modal-title" id="win-name">Player</div>
    <div class="modal-sub" id="win-sub">wins the session!</div>
    <button class="modal-btn primary" onclick="closeWinModal(true)">New Session</button>
    <button class="modal-btn secondary" onclick="closeWinModal(false)">Keep Playing</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const COLORS = ['var(--red)', 'var(--blue)', 'var(--green)', 'var(--yellow)'];
const COLOR_HEX = ['#E8173A', '#0057B8', '#00964B', '#F5C400'];
const DEFAULT_NAMES = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];

let state = {
  players: [],
  scores: [],    // total accumulated
  rounds: [],    // [{scores:[n,n,n], winner:idx, ts}]
  wins: [],
  goal: 500,
  sessionStart: null
};

// ── PERSISTENCE ──
function save() {
  try { localStorage.setItem('uno_state', JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const raw = localStorage.getItem('uno_state');
    if (raw) { state = JSON.parse(raw); return true; }
  } catch(e){}
  return false;
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem('uno_history') || '[]'); } catch(e){ return []; }
}
function saveToHistory(session) {
  const h = getHistory();
  h.unshift(session);
  localStorage.setItem('uno_history', JSON.stringify(h.slice(0, 100)));
}

// ── SETUP ──
let playerCount = 2;
function setCount(n) {
  playerCount = n;
  [2,3,4].forEach(i => document.getElementById('cnt'+i).classList.toggle('active', i===n));
  renderPlayerInputs();
}

function renderPlayerInputs() {
  const el = document.getElementById('player-inputs');
  el.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    const saved = (state.players && state.players[i]) ? state.players[i] : DEFAULT_NAMES[i];
    el.innerHTML += `
      <div class="player-input-row">
        <div class="player-dot" style="background:${COLOR_HEX[i]}"></div>
        <input type="text" placeholder="${DEFAULT_NAMES[i]}" value="${saved}" id="pname${i}" maxlength="20">
      </div>`;
  }
}

function startGame() {
  const names = [];
  for (let i = 0; i < playerCount; i++) {
    const v = document.getElementById('pname'+i).value.trim();
    names.push(v || DEFAULT_NAMES[i]);
  }
  const goal = parseInt(document.getElementById('win-goal-setup').value) || 500;
  state = {
    players: names,
    scores: new Array(playerCount).fill(0),
    rounds: [],
    wins: new Array(playerCount).fill(0),
    goal,
    sessionStart: new Date().toISOString()
  };
  save();
  buildGameUI();
  showTab('game');
}

// ── GAME UI ──
function buildGameUI() {
  buildScoreboard();
  buildRoundInputs();
  updateGameUI();
}

function buildScoreboard() {
  const el = document.getElementById('scoreboard');
  el.innerHTML = state.players.map((p, i) => `
    <div class="score-card">
      <div class="player-name">${p}</div>
      <div class="total-score" id="score-${i}">0</div>
      <div class="wins-badge">🏆 <span id="wins-${i}">0</span> wins</div>
    </div>`).join('');
}

function buildRoundInputs() {
  const el = document.getElementById('round-inputs');
  el.innerHTML = state.players.map((p, i) => `
    <div class="round-row">
      <label>
        <div class="player-dot" style="background:${COLOR_HEX[i]}"></div>
        ${p} <span>(pts scored this round)</span>
      </label>
      <input type="number" class="score-input" id="rinput-${i}" min="0" placeholder="0">
    </div>`).join('');
}

function updateGameUI() {
  // scores
  state.players.forEach((_, i) => {
    document.getElementById('score-'+i).textContent = state.scores[i];
    document.getElementById('wins-'+i).textContent = state.wins[i];
  });
  // goal
  document.getElementById('goal-display').textContent = state.goal + ' pts';
  document.getElementById('win-goal-game').value = state.goal;
  // stats
  renderStats();
  renderBars();
}

function addRound() {
  const roundScores = state.players.map((_, i) => {
    return parseInt(document.getElementById('rinput-'+i).value) || 0;
  });

  // in UNO the winner gets 0 and others add their hand — but here we track
  // the score entered per player directly; winner = lowest or as user enters.
  // We'll treat: whoever has the LOWEST score in this round as the winner.
  const min = Math.min(...roundScores);
  const winnerIdx = roundScores.indexOf(min);

  state.rounds.push({ scores: roundScores, winner: winnerIdx, ts: new Date().toISOString() });
  roundScores.forEach((s, i) => { state.scores[i] += s; });
  state.wins[winnerIdx]++;
  save();
  updateGameUI();

  // clear inputs
  state.players.forEach((_, i) => { document.getElementById('rinput-'+i).value = ''; });

  toast(`Round ${state.rounds.length} saved! ${state.players[winnerIdx]} wins the round 🎉`);

  // check win goal
  const goalWinner = state.scores.findIndex(s => s >= state.goal);
  if (goalWinner !== -1) {
    setTimeout(() => showWinModal(goalWinner), 400);
  }
}

function renderStats() {
  const n = state.players.length;
  const totalRounds = state.rounds.length;
  const leader = state.scores.indexOf(Math.max(...state.scores));

  const rows = state.players.map((p, i) => {
    const wins = state.wins[i];
    const winPct = totalRounds ? Math.round(wins / totalRounds * 100) : 0;
    const avg = totalRounds ? Math.round(state.scores[i] / totalRounds) : 0;
    const toGoal = Math.max(0, state.goal - state.scores[i]);
    const isLeader = i === leader && totalRounds > 0;

    return `<tr>
      <td><div class="player-tag">
        <div class="player-tag-dot" style="background:${COLOR_HEX[i]}"></div>
        ${p} ${isLeader ? '<span class="leader-chip">LEAD</span>' : ''}
      </div></td>
      <td>${totalRounds}</td>
      <td>${wins}</td>
      <td>${winPct}%</td>
      <td>${avg}</td>
      <td>${toGoal === 0 ? '✅' : toGoal}</td>
    </tr>`;
  }).join('');
  document.getElementById('stats-body').innerHTML = rows;
}

function renderBars() {
  const max = Math.max(...state.scores, 1);
  const el = document.getElementById('bar-chart');
  el.innerHTML = state.players.map((p, i) => {
    const pct = Math.round(state.scores[i] / max * 100);
    return `<div class="bar-row">
      <div class="bar-name">${p}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${COLOR_HEX[i]}"></div></div>
      <div class="bar-val">${state.scores[i]}</div>
    </div>`;
  }).join('');
}

function updateGoal(v) {
  state.goal = parseInt(v) || 500;
  document.getElementById('goal-display').textContent = state.goal + ' pts';
  save();
}

// ── WIN MODAL ──
function showWinModal(idx) {
  document.getElementById('win-name').textContent = '🥇 ' + state.players[idx];
  document.getElementById('win-sub').textContent = `reached ${state.goal} points — session winner!`;
  document.getElementById('win-modal').classList.add('open');
}
function closeWinModal(newSession) {
  document.getElementById('win-modal').classList.remove('open');
  if (newSession) confirmNewGame();
}

// ── NEW GAME ──
function confirmNewGame() {
  if (!state.rounds.length) { showTab('setup'); return; }
  if (confirm('Save current session to history and start a new one?')) {
    saveToHistory({
      players: state.players,
      scores: state.scores,
      wins: state.wins,
      rounds: state.rounds,
      goal: state.goal,
      sessionStart: state.sessionStart,
      sessionEnd: new Date().toISOString()
    });
    state = { players: state.players, scores: [], rounds: [], wins: [], goal: state.goal, sessionStart: null };
    showTab('setup');
  }
}

// ── HISTORY ──
function renderHistory() {
  const h = getHistory();
  const el = document.getElementById('history-list');
  if (!h.length) {
    el.innerHTML = `<div class="empty-state"><div class="big">🃏</div>No sessions yet.<br>Play some games!</div>`;
    return;
  }
  el.innerHTML = h.map((s, si) => {
    const date = new Date(s.sessionEnd || s.sessionStart).toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const winner = s.wins.indexOf(Math.max(...s.wins));
    const roundRows = s.rounds.map((r, ri) => {
      const scores = s.players.map((p, i) => `${p}: ${r.scores[i]}`).join(' · ');
      return `<div class="round-line"><span>Round ${ri+1}</span><strong>${scores}</strong></div>`;
    }).join('');

    return `<div class="history-session">
      <div class="history-session-header" onclick="toggleHistory(${si})">
        <div>
          <div class="session-summary">🏆 ${s.players[winner]} · ${s.rounds.length} rounds</div>
          <div class="session-date">${date} · Goal: ${s.goal} pts</div>
        </div>
        <div style="color:var(--muted);font-size:1.2rem" id="hist-arrow-${si}">›</div>
      </div>
      <div class="history-rounds" id="hist-rounds-${si}">
        <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap;">
          ${s.players.map((p, i) => `<div style="font-size:.8rem;"><span style="color:${COLOR_HEX[i]};font-weight:600">${p}</span> — ${s.scores[i]} pts · ${s.wins[i]} wins</div>`).join('')}
        </div>
        ${roundRows}
      </div>
    </div>`;
  }).join('');
}

function toggleHistory(idx) {
  const el = document.getElementById('hist-rounds-'+idx);
  const arrow = document.getElementById('hist-arrow-'+idx);
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '↓' : '›';
}

// ── TABS ──
function showTab(name) {
  ['setup','game','history'].forEach(t => {
    document.getElementById('screen-'+t).style.display = 'none';
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('screen-'+name).style.display = 'block';
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'game' && !state.players.length) { showTab('setup'); return; }
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── INIT ──
renderPlayerInputs();
if (loadState() && state.players && state.players.length) {
  playerCount = state.players.length;
  setCount(playerCount);
  buildGameUI();
  // Pre-fill setup names
  state.players.forEach((p, i) => {
    const el = document.getElementById('pname'+i);
    if (el) el.value = p;
  });
  if (state.rounds && state.rounds.length > 0) {
    showTab('game');
  }
}
</script>
</body>
</html>
